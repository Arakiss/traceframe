# cargo-deny configuration for slod.
#
# Run locally with: `cargo deny check`
# CI runs: advisories, bans, licenses, sources.

[advisories]
version = 2
# All known advisories are errors — no silent exceptions.
ignore = []
# Yanked crates block the build.
yanked = "deny"

[bans]
# Wildcard version requirements are not allowed.
wildcards = "deny"
# Duplicate versions are a smell, warn for now.
multiple-versions = "warn"
highlight = "all"
deny = [
    # Place any hard-banned crates here (e.g. ones with CVEs we can't ignore).
]
skip = [
    { crate = "wit-bindgen@0.51.0", reason = "WASI target support from getrandom pulls two wit-bindgen lines through uuid/tempfile." },
]
skip-tree = []

[licenses]
version = 2
# Allowlist — anything else trips the build.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "Unicode-3.0",
]
confidence-threshold = 0.92
exceptions = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
