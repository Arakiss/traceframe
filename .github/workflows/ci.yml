name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify local agent files not tracked
        run: sh scripts/check-local-agent-files.sh

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools-preview

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Test
        run: cargo test

      - name: Install coverage tool
        run: cargo install cargo-llvm-cov --version 0.8.5 --locked

      - name: Coverage threshold
        run: cargo llvm-cov --workspace --all-targets --fail-under-lines 80

      - name: Release readiness
        run: sh scripts/check-release-readiness.sh

      - name: Host smoke
        run: sh scripts/host-smoke.sh

      - name: Agent hook smoke
        run: sh scripts/hook-smoke.sh

      - name: Smoke sample trace
        run: |
          cargo run -- verify --file examples/agent-run.slod
          cargo run -- summary --file examples/agent-run.slod
          cargo run -- render --file examples/agent-run.slod --html /tmp/slod-agent-run.html
          test -s /tmp/slod-agent-run.html

      - name: Dogfood command tracing
        run: |
          mkdir -p /tmp/slod-runs
          cargo run -- run --file /tmp/slod-runs/ci-dogfood.slod --run-id ci-dogfood --force -- cargo --version
          cargo run -- ledger rebuild --dir /tmp/slod-runs --out /tmp/slod-ledger.slod
          cargo run -- ledger list --file /tmp/slod-ledger.slod
          cargo run -- ledger show --file /tmp/slod-ledger.slod --run-id ci-dogfood
          cargo run -- verify --file /tmp/slod-runs/ci-dogfood.slod
          cargo run -- summary --file /tmp/slod-runs/ci-dogfood.slod

  commitlint:
    name: commitlint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Lint commit messages
        uses: wagoid/commitlint-github-action@v6
        with:
          configFile: .commitlintrc.yaml
          failOnWarnings: true

  cargo-deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Audit dependencies
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans licenses sources
