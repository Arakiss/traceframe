name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Test
        run: cargo test

      - name: Smoke sample trace
        run: |
          cargo run -- verify --file examples/agent-run.traceframe
          cargo run -- summary --file examples/agent-run.traceframe
          cargo run -- render --file examples/agent-run.traceframe --html /tmp/traceframe-agent-run.html
          test -s /tmp/traceframe-agent-run.html

      - name: Dogfood command tracing
        run: |
          cargo run -- init --file /tmp/traceframe-ci.traceframe --run-id ci-dogfood --force
          cargo run -- exec --file /tmp/traceframe-ci.traceframe -- cargo --version
          cargo run -- finish --file /tmp/traceframe-ci.traceframe --status success --summary "CI command tracing smoke"
          cargo run -- verify --file /tmp/traceframe-ci.traceframe
          cargo run -- summary --file /tmp/traceframe-ci.traceframe
