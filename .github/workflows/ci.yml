name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Test
        run: cargo test

      - name: Smoke sample trace
        run: |
          cargo run -- verify --file examples/agent-run.traceframe.jsonl
          cargo run -- summary --file examples/agent-run.traceframe.jsonl
          cargo run -- render --file examples/agent-run.traceframe.jsonl --html /tmp/traceframe-agent-run.html
          test -s /tmp/traceframe-agent-run.html
