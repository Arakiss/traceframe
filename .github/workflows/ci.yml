name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools-preview

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Test
        run: cargo test

      - name: Install coverage tool
        run: cargo install cargo-llvm-cov --version 0.8.5 --locked

      - name: Coverage threshold
        run: cargo llvm-cov --workspace --all-targets --fail-under-lines 80

      - name: Release readiness
        run: sh scripts/check-release-readiness.sh

      - name: Host smoke
        run: sh scripts/host-smoke.sh

      - name: Agent hook smoke
        run: sh scripts/hook-smoke.sh

      - name: Smoke sample trace
        run: |
          cargo run -- verify --file examples/agent-run.traceframe
          cargo run -- summary --file examples/agent-run.traceframe
          cargo run -- render --file examples/agent-run.traceframe --html /tmp/traceframe-agent-run.html
          test -s /tmp/traceframe-agent-run.html

      - name: Dogfood command tracing
        run: |
          mkdir -p /tmp/traceframe-runs
          cargo run -- run --file /tmp/traceframe-runs/ci-dogfood.traceframe --run-id ci-dogfood --force -- cargo --version
          cargo run -- ledger rebuild --dir /tmp/traceframe-runs --out /tmp/traceframe-ledger.traceframe
          cargo run -- ledger list --file /tmp/traceframe-ledger.traceframe
          cargo run -- ledger show --file /tmp/traceframe-ledger.traceframe --run-id ci-dogfood
          cargo run -- verify --file /tmp/traceframe-runs/ci-dogfood.traceframe
          cargo run -- summary --file /tmp/traceframe-runs/ci-dogfood.traceframe
